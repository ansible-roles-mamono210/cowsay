---
- name: Prepare
  hosts: all
  become: true
  vars:
    pg_hba_conf_path: /var/lib/pgsql/14/data/pg_hba.conf
    work_dir: /tmp/redmine-install-dir

  tasks:
    - name: Create a new PostgreSQL database cluster(CentOS8)
      ansible.builtin.shell:
        cmd: "/usr/pgsql-14/bin/postgresql-14-setup initdb"  # noqa command-instead-of-shell
      register: initdb_output
      changed_when: "'Initializing database ... OK' in initdb_output.stdout"
      environment:
        PGSETUP_INITDB_OPTIONS: "--encoding=UTF-8 --no-locale"

    - name: Start PostgreSQL server
      ansible.builtin.systemd_service:
        name: postgresql-14
        state: started
        enabled: true

    - name: Install requirements
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
        - gcc
        - patch

    - name: Install Python
      ansible.builtin.package:
        name: python3-devel
        state: present

    - name: Install psycopg2
      ansible.builtin.pip:
        name: psycopg2
        state: present
      environment:
        PATH: "/usr/pgsql-14/bin:{{ ansible_env.PATH }}"

    - name: Delete working directory
      ansible.builtin.file:
        path: '{{ work_dir }}'
        state: absent

    - name: Create working directory
      ansible.builtin.file:
        path: '{{ work_dir }}'
        state: directory
        mode: 0755

    - name: Creare patch for adding host-based authentication into pg_hba.conf
      ansible.builtin.template:
        src: pg_hba_conf.patch
        dest: "{{ work_dir }}/pg_hba_conf.patch"
        mode: 0755

    - name: Add host-based authentication settings into pg_hba.conf
      ansible.posix.patch:
        src: "{{ work_dir }}/pg_hba_conf.patch"
        dest: '{{ pg_hba_conf_path }}'
        remote_src: yes

    - name: Restart postgresql.service
      ansible.builtin.service:
        name: postgresql-14
        state: restarted
        enabled: yes

    - name: Add privilege escalation to user 'postgres'
      ansible.builtin.lineinfile:
        dest: /etc/sudoers.d/postgres
        owner: root
        group: root
        mode: 0440
        line: "%{{ ansible_user_id }} ALL=(postgres) NOPASSWD: ALL"
        state: present
        create: yes
        validate: "visudo -cf %s"
      environment:
        PATH:
          "{{ ansible_env.PATH }} "

    - name: Create PostgreSQL user
      become: True
      become_user: postgres
      become_method: ansible.builtin.sudo
      community.general.postgresql_user:
        name: '{{ redmine_user_user }}'
        password: '{{ redmine_db_password }}'
      no_log: true

    - name: Create database
      become: true
      become_user: postgres
      become_method: ansible.builtin.sudo
      community.general.postgresql_db:
        name: redmine
        encoding: UTF-8
        lc_collate: ja_JP.UTF-8
        lc_ctype: ja_JP.UTF-8
        template: template0

    - name: Remove privilege escalation from user 'postgres'
      ansible.builtin.file:
        path: /etc/sudoers.d/postgres
        state: absent
